<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to No Shaghaloo | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('PIC/WhatsApp Image 2026-01-23 at 11.27.10 PM.jpeg') no-repeat center center fixed;
            background-size: cover;
        }

        .hero-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .welcome-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 700px;
            margin: 0 20px;
            animation: fadeInScale 1.5s ease-out;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .welcome-box h1 {
            font-family: 'Playfair Display', serif;
            color: #fff;
            font-size: 3.5rem;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .welcome-box p {
            color: #f1f1f1;
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
            font-weight: 300;
        }

        .btn-shop {
            display: inline-block;
            text-decoration: none;
            padding: 15px 45px;
            background-color: #a68b5a; 
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-shop:hover {
            background-color: #8a6d3b;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 768px) {
            .welcome-box h1 { font-size: 2.2rem; }
            .welcome-box p { font-size: 1rem; }
            .btn-shop { padding: 12px 35px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="welcome-box">
            <h1>Welcome to Our Gallery</h1>
            <p>Experience the art of handcrafted perfection. We create unique pieces that bring soul and elegance to your modern home decor.</p>
            
            <a href="Shop.html" class="btn-shop">Shop Our Collection</a>
        </div>
    </section>

</body>
</html>
