<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Grand Collection | TAFASEEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #a68b5a;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            padding-bottom: 80px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(166, 139, 90, 0.3);
            height: 70px;
        }

        .logo h2 { font-size: 24px; color: var(--gold); letter-spacing: 2px; font-weight: 800; }
        
        nav ul { display: flex; list-style: none; gap: 30px; align-items: center; }
        nav ul li a { 
            text-decoration: none; 
            color: white; 
            font-size: 14px; 
            font-weight: 600; 
            text-transform: uppercase; 
            opacity: 0.8;
            transition: 0.3s;
        }
        nav ul li a:hover, .active-link { color: var(--gold) !important; opacity: 1; }

        .mobile-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            border-top: 1px solid var(--gold);
            padding: 12px 0;
            justify-content: space-around;
            z-index: 2000;
        }

        .mobile-bar a { color: white; text-decoration: none; font-size: 18px; display: flex; flex-direction: column; align-items: center; }
        .mobile-bar a span { font-size: 9px; margin-top: 4px; }
        .mobile-bar a.active { color: var(--gold); }

        .gallery-container {
            max-width: 1400px;
            margin: 100px auto 20px;
            background: var(--glass);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(166, 139, 90, 0.1);
            backdrop-filter: blur(15px);
            animation: fadeInUp 0.8s ease;
        }

        .gallery-header { text-align: center; margin-bottom: 40px; }
        .gallery-title { font-size: clamp(1.8rem, 5vw, 3.5rem); color: var(--gold); margin: 0; }
        .sub-title { color: #888; margin-top: 10px; font-size: 0.9rem; }

        /* تعديل الـ grid عشان يشتغل مع الـ JavaScript */
        .designs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (min-width: 768px) {
            .designs-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        }

        .design-card {
            position: relative;
            background: #151515;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            transition: 0.3s;
        }

        .design-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s ease; }
        .design-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .design-card:hover img { transform: scale(1.1); filter: brightness(0.4); }

        .overlay-info {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            transition: 0.4s;
            width: 100%;
        }

        .design-card:hover .overlay-info { opacity: 1; }

        .inquiry-btn {
            background: var(--gold);
            color: black;
            padding: 8px 15px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 4px;
        }

        .product-id { display: block; margin-top: 5px; font-size: 0.6rem; color: #fff; opacity: 0.7; }

        @media (max-width: 768px) {
            nav ul { display: none; }
            nav { justify-content: center; height: 60px; }
            .mobile-bar { display: flex; }
            .gallery-container { margin-top: 70px; padding: 15px; }
        }
        footer {
    text-align: center; /* بيخلي كل الكلام في النص */
    padding: 40px 0 120px; /* مسافة من فوق ومن تحت عشان شريط الموبايل */
    width: 100%;
    border-top: 1px solid rgba(166, 139, 90, 0.1);
    margin-top: 50px;
}

.btn-instagram {
    color: var(--gold);
    text-decoration: none;
    font-size: 1.2rem;
    font-weight: bold;
    letter-spacing: 2px;
    display: inline-block;
    margin-bottom: 10px;
    text-transform: uppercase;
}

.copyright-text {
    color: #888;
    font-size: 0.8rem;
    display: block;
    letter-spacing: 1px;
}
    </style>
</head>
<body>

    <nav>
        <div class="logo"><h2>TAFASEEL</h2></div>
        <ul>
            <li><a href="Home.html">Home</a></li>
            <li><a href="Shop.html" class="active-link">Shop</a></li>
            <li><a href="About.html">About</a></li>
            <li><a href="Big.html">Blog</a></li>

            <li><a href="Contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="mobile-bar">
        <a href="Home.html"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="Shop.html" class="active"><i class="fas fa-shopping-bag"></i><span>المتجر</span></a>
        <a href="About.html"><i class="fas fa-info-circle"></i><span>عنّا</span></a>
         <a href="Big.html"><i class="fas fa-newspaper"></i><span>مدونة</span></a> 
        <a href="Contact.html"><i class="fas fa-envelope"></i><span>تواصل</span></a>
    </div>

    <section class="gallery-container">
        <header class="gallery-header">
            <h2 class="gallery-title">The Collection</h2>
            <p class="sub-title">إضغط على التصميم للاستفسار عبر واتساب</p>
        </header>

        <div class="designs-grid" id="main-gallery"></div>
    </section>

    <script>
        const gallery = document.getElementById('main-gallery');
        let cards = '';

    for (let i = 1; i < 89; i++) {
    // تم توحيد المسار لجميع الصور لتبدأ من P1.jpeg إلى P91.jpeg
    let imgSrc = `all-pic3/P${i}.jpeg`;

    cards += `
        <a href="https://wa.me/201279150169?text=Hello Mr. Emad, I want the price of product number ${i}" target="_blank" class="design-card">
            <img src="${imgSrc}" alt="Design ${i}" loading="lazy">
            <div class="overlay-info">
                <span class="inquiry-btn">استفسر الآن</span>
                <span class="product-id">Piece #${i.toString().padStart(2, '0')}</span>
            </div>
        </a>
    `;
}

        gallery.innerHTML = cards;
    </script>
<footer>
    <a href="https://www.instagram.com/tafaseel_art" target="_blank" class="btn-instagram">
        FOLLOW TAFASEEL 
    </a>
    <span class="copyright-text">
        TAFASEEL | Crafted by Emad Hamdy 2026 
</footer>
</body>
</html>
